name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  testes:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes
        run: CI=true npm test
